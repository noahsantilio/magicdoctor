<!DOCTYPE html>
<html>

<head>

<title>Magic Doctor</title>

<style>

body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:40px;
background:#f4f4f4;
}

textarea{
width:100%;
height:220px;
margin-top:10px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
}

button{
padding:10px;
margin-top:10px;
margin-right:10px;
}

pre{
background:white;
padding:20px;
margin-top:20px;
}

</style>

</head>

<body>

<h1>Magic Doctor</h1>

<select id="inputMode" onchange="toggleMode()">

<option value="moxfield">Link do Moxfield</option>
<option value="manual">Colar lista do deck</option>

</select>

<input id="deckLink" placeholder="https://moxfield.com/decks/XXXX">

<textarea id="deckList" style="display:none"></textarea>

<button onclick="analyzeDeck()">Analisar</button>
<button onclick="clearAnalysis()">Limpar análise</button>

<pre id="result">Resultado aparecerá aqui</pre>

<canvas id="manaChart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
