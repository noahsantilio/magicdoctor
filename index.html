<!DOCTYPE html>
<html>

<head>

<title>Magic Doctor</title>

<style>

body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:40px;
background:#f4f4f4;
}

h1{
text-align:center;
}

select,input,textarea{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
}

textarea{
height:220px;
}

button{
padding:12px;
margin-top:10px;
font-size:16px;
cursor:pointer;
margin-right:10px;
}

pre{
background:white;
padding:20px;
margin-top:20px;
border-radius:6px;
overflow:auto;
}

canvas{
margin-top:20px;
background:white;
padding:10px;
border-radius:6px;
}

</style>

</head>

<body>

<h1>Magic Doctor</h1>

<p>Escolha como deseja analisar o deck:</p>

<select id="inputMode" onchange="toggleInputMode()">
<option value="moxfield">Link do Moxfield</option>
<option value="manual">Colar lista do deck</option>
</select>

<input
id="deckLink"
placeholder="https://moxfield.com/decks/XXXXX"
/>

<textarea
id="deckList"
placeholder="Cole a lista do deck aqui"
style="display:none"
></textarea>

<button onclick="analyzeDeck()">Analisar Deck</button>
<button onclick="clearAnalysis()">Limpar análise</button>

<pre id="result">Resultado aparecerá aqui</pre>

<canvas id="manaCurveChart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
