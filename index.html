<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Doctor - Avaliador de Decks</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <header>
            <h1>Magic Doctor</h1>
            <p class="subtitle">Ferramenta de análise de decks de Commander</p>
        </header>

        <section class="deck-input-section">
            <textarea id="decklist" 
                placeholder="Cole sua lista aqui...&#10;Exemplo:&#10;1 Sol Ring&#10;1 Command Tower&#10;1 Arcane Signet"></textarea>
            
            <div class="counter-container">
                Cartas detectadas: <span id="card-count">0</span>
            </div>
        </section>

        <div class="button-group">
            <button id="btn-analisar" class="btn-blue">Analisar Deck</button>
            <button id="btn-limpar" class="btn-gray">Limpar Análise</button>
        </div>

        <div id="resultado-container" class="hidden">
            </div>

        <footer>
            <div class="footer-content">
                <h3>Sobre a Avaliação</h3>
                <p id="info-text">
                    [Espaço reservado para a explicação dos critérios de avaliação]
                </p>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
