<!DOCTYPE html>
<html>

<head>

<title>Magic Doctor</title>

<style>

body{
font-family: Arial;
max-width:900px;
margin:auto;
padding:40px;
background:#f7f7f7;
}

h1{
text-align:center;
}

select,input,textarea{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
}

textarea{
height:220px;
}

button{
padding:12px;
margin-top:10px;
font-size:16px;
cursor:pointer;
}

pre{
background:white;
padding:20px;
margin-top:20px;
border-radius:6px;
overflow:auto;
}

</style>

</head>

<body>

<h1>Magic Doctor</h1>

<p>Escolha como deseja analisar o deck:</p>

<select id="inputMode" onchange="toggleInputMode()">

<option value="moxfield">Link do Moxfield</option>
<option value="manual">Colar lista do deck</option>

</select>

<input
id="deckLink"
placeholder="https://www.moxfield.com/decks/XXXXX"
/>

<textarea
id="deckList"
placeholder="Cole a lista do deck aqui (ex: 1 Sol Ring)"
style="display:none"
></textarea>

<button onclick="analyzeDeck()">
Analisar Deck
</button>

<pre id="result">
Resultado aparecerá aqui
</pre>

<script src="script.js"></script>

</body>

</html>
